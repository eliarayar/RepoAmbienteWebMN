<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Proyecto Web MN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
<link rel="stylesheet" href="css/main.css">

</head>

<body>
<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card " style="max-width:420px; width:100%;">
    <div class="card-body p-5">
      <div class="text-center mb-3">
      <a href="index.html" class="mb-4 d-inline-block"><img src="images/logo-icon.svg" alt="" width="36">
      <span class=" ms-2"> <img src="images/logo.svg" alt=""></span>
      </a>
        <h1 class="card-title mb-5 h5">Sign in to your account</h1>

      </div>

      <form class="needs-validation mt-3" novalidate>
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input id="email" type="email" class="form-control" placeholder="name@example.com" required 
              autofocus>
        </div>

        <button class="btn btn-primary w-100" type="submit">Sign in</button>
      </form>

      <div class="text-center mt-3 small text-muted">
        Don't have an account? <a href="signup.html"  class="link-primary">Sign up</a>
      </div>
    </div>
  </div>
</div>



  <!-- Bootstrap JS -->
  <script src="js/sidebar.js"></script>



</body>

</html>
